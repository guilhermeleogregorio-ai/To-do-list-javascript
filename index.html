<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <title>To-Do-List</title>
</head>
<body>
<div>
      <div class="container">
        <header class="main-header">
            <h1 class="titulo">Minha Lista de Tarefas</h1>
        </header>

        
        <form id="todo-form">
            <input type="text" id="NovaTarefa" placeholder="Nova tarefa..." required>
            <button type="submit" class="Adicionar" id="addBtn">Adicionar</button>
        </form>

        <h2>Lista de  tarefas</h2>   
        <ul id="ListaTarefas"></ul>
        
    </div>

<footer>
    <p class="footer">Total de tarefas:<span id="contador"></span></p>
</footer>

    
    <script src="main.js"></script>
</body>
</html>
